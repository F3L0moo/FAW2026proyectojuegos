<div class="min-h-screen bg-gray-900 text-white flex items-center justify-center">

  <div class="bg-gray-800 p-8 rounded-xl w-[500px]">

    <h1 class="text-4xl mb-6 text-center">

      Juego Adivina

    </h1>

    <div class="mb-4 text-center">

      <p class="text-xl">

        Intentos:
        {{intentos}}

      </p>

      <p class="text-xl">

        Score:
        {{score}}

      </p>

    </div>

    <input
      [(ngModel)]="numeroUsuario"
      type="number"
      placeholder="Número del 1 al 100"
      class="w-full p-3 rounded text-black mb-4"
    />

    <button
      (click)="adivinar()"
      class="bg-blue-500 hover:bg-blue-700 w-full py-3 rounded-xl mb-4"
    >
      Adivinar
    </button>

    <div class="text-center text-2xl mb-4">

      {{mensaje}}

    </div>

    @if(juegoTerminado){

      <button
        (click)="iniciarJuego()"
        class="bg-green-500 hover:bg-green-700 w-full py-3 rounded-xl"
      >
        Jugar nuevamente
      </button>

    }

  </div>

</div>
